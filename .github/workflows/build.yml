name: Build
on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Build the packable projects and the test project only (not the Foundation
      # submodule / Web / AppHost) so restore stays limited to the package's own
      # dependencies. Building the test project also builds ProductFeed + Google.
      - name: Build CSV
        run: dotnet build src/Geta.Optimizely.ProductFeed.Csv/Geta.Optimizely.ProductFeed.Csv.csproj -c Release

      - name: Build tests
        run: dotnet build tests/Geta.Optimizely.ProductFeed.Tests/Geta.Optimizely.ProductFeed.Tests.csproj -c Release

      - name: Test
        run: dotnet test tests/Geta.Optimizely.ProductFeed.Tests/Geta.Optimizely.ProductFeed.Tests.csproj -c Release --no-build --filter Category!=Integration
